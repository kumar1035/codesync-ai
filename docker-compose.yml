version: '3.9'

networks:
  codesync-network:
    driver: bridge

volumes:
  redis-data:
  kafka-data:
  zookeeper-data:

# Supabase is used for PostgreSQL — no local postgres container needed.
# DATABASE_URL points to db.ldthtzpdbyciewdpmjhh.supabase.co

services:
  # ─── Infrastructure ────────────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    container_name: codesync-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass codesync_redis_secret
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - codesync-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "codesync_redis_secret", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: codesync-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    networks:
      - codesync-network
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: codesync-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - codesync-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: codesync-kafka-ui
    restart: unless-stopped
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: codesync
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - codesync-network

  # ─── Backend Services ──────────────────────────────────────────────────────

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: codesync-api-gateway
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: development
      PORT: 4000
      AUTH_SERVICE_URL: http://auth-service:4001
      COLLABORATION_SERVICE_URL: http://collaboration-service:4002
      AI_SERVICE_URL: http://ai-service:4004
      EXECUTION_SERVICE_URL: http://execution-service:4005
      ANALYTICS_SERVICE_URL: http://analytics-service:4006
      HISTORY_SERVICE_URL: http://history-service:4008
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: codesync_redis_secret
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey_change_in_production_32chars}
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - codesync-network

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: codesync-auth-service
    restart: unless-stopped
    ports:
      - "4001:4001"
    environment:
      NODE_ENV: development
      PORT: 4001
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: codesync_redis_secret
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey_change_in_production_32chars}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-supersecretrefreshkey_change_in_production_32chars}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      KAFKA_BROKER: kafka:29092
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - codesync-network

  collaboration-service:
    build:
      context: ./services/collaboration-service
      dockerfile: Dockerfile
    container_name: codesync-collaboration-service
    restart: unless-stopped
    ports:
      - "4002:4002"
    environment:
      NODE_ENV: development
      PORT: 4002
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: codesync_redis_secret
      KAFKA_BROKER: kafka:29092
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey_change_in_production_32chars}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - codesync-network

  websocket-service:
    build:
      context: ./services/websocket-service
      dockerfile: Dockerfile
    container_name: codesync-websocket-service
    restart: unless-stopped
    ports:
      - "4003:4003"
    environment:
      NODE_ENV: development
      PORT: 4003
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: codesync_redis_secret
      KAFKA_BROKER: kafka:29092
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey_change_in_production_32chars}
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - codesync-network

  ai-service:
    build:
      context: ./services/ai-service
      dockerfile: Dockerfile
    container_name: codesync-ai-service
    restart: unless-stopped
    ports:
      - "4004:4004"
    environment:
      NODE_ENV: development
      PORT: 4004
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: codesync_redis_secret
      KAFKA_BROKER: kafka:29092
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey_change_in_production_32chars}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - codesync-network

  execution-service:
    build:
      context: ./services/execution-service
      dockerfile: Dockerfile
    container_name: codesync-execution-service
    restart: unless-stopped
    ports:
      - "4005:4005"
    environment:
      NODE_ENV: development
      PORT: 4005
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: codesync_redis_secret
      KAFKA_BROKER: kafka:29092
      DOCKER_SOCKET: /var/run/docker.sock
      EXECUTION_TIMEOUT: 30000
      EXECUTION_MEMORY_LIMIT: 128m
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey_change_in_production_32chars}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - codesync-network

  analytics-service:
    build:
      context: ./services/analytics-service
      dockerfile: Dockerfile
    container_name: codesync-analytics-service
    restart: unless-stopped
    ports:
      - "4006:4006"
    environment:
      NODE_ENV: development
      PORT: 4006
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: codesync_redis_secret
      KAFKA_BROKER: kafka:29092
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey_change_in_production_32chars}
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - codesync-network

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: codesync-notification-service
    restart: unless-stopped
    ports:
      - "4007:4007"
    environment:
      NODE_ENV: development
      PORT: 4007
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: codesync_redis_secret
      KAFKA_BROKER: kafka:29092
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey_change_in_production_32chars}
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - codesync-network

  history-service:
    build:
      context: ./services/history-service
      dockerfile: Dockerfile
    container_name: codesync-history-service
    restart: unless-stopped
    ports:
      - "4008:4008"
    environment:
      NODE_ENV: development
      PORT: 4008
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: codesync_redis_secret
      KAFKA_BROKER: kafka:29092
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey_change_in_production_32chars}
    networks:
      - codesync-network

  # ─── Frontend ──────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: codesync-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_SOCKET_URL: http://localhost:4003
      NEXT_PUBLIC_AI_PROVIDER: openai
    depends_on:
      - api-gateway
      - websocket-service
    networks:
      - codesync-network

  # ─── Nginx Reverse Proxy ───────────────────────────────────────────────────

  nginx:
    image: nginx:alpine
    container_name: codesync-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - api-gateway
      - websocket-service
    networks:
      - codesync-network
